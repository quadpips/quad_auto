log4j.logger.ros.egocylindrical=INFO
log4j.logger.ros.egocylindrical.timing=DEBUG
log4j.logger.ros.egocylindrical.ecwrapper_buffer=DEBUG
log4j.logger.ros.egocylindrical.labels=DEBUG

